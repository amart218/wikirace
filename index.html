<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WikiRace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

    :root {
      --bg:      #0d0d0d;
      --surface: #181818;
      --border:  #2a2a2a;
      --accent:  #538d4e;
      --text:    #f0f0f0;
      --muted:   #666666;
      --red:     #ff4747;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.012) 2px, rgba(255,255,255,.012) 4px);
      pointer-events: none; z-index: 9999;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }

    /* HOME */
    #screen-home {
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; position: relative; overflow: hidden;
    }
    #screen-home::after {
      content: 'WIKI'; position: absolute;
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(200px, 40vw, 500px);
      color: rgba(83,141,78,.06);
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      user-select: none; pointer-events: none;
    }
    .logo {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 1; letter-spacing: 4px; text-align: center;
    }
    .logo span { color: var(--accent); }
    .logo-sub {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: .85rem; letter-spacing: 6px;
      color: var(--muted); text-align: center; margin-top: .5rem;
    }
    .home-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 2rem;
      width: 100%; max-width: 440px; margin-top: 3rem;
      position: relative; z-index: 1;
    }

    /* Daily badge */
    .daily-badge {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      font-family: 'IBM Plex Mono', monospace; font-size: .65rem;
      letter-spacing: 3px; color: var(--accent); text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .daily-badge::before, .daily-badge::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .route-preview {
      display: flex; align-items: center; justify-content: center;
      gap: .75rem; margin-bottom: 1.75rem;
    }
    .route-chip {
      background: var(--bg); border: 1px solid var(--text);
      border-radius: 6px; padding: .45rem .9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .85rem; color: var(--text);
    }
    .route-chip.loading { color: var(--muted); border-color: var(--border); }
    .route-arrow { color: var(--muted); font-size: 1.3rem; }

    .no-pair-msg {
      font-family: 'IBM Plex Mono', monospace; font-size: .8rem;
      color: var(--red); text-align: center; padding: .75rem;
      border: 1px solid var(--red); border-radius: 8px;
      margin-bottom: 1rem; display: none;
    }

    .field-label {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: .7rem; letter-spacing: 3px;
      color: var(--muted); text-transform: uppercase; margin-bottom: .5rem;
    }
    .field {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .75rem 1rem; color: var(--text);
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      font-size: 1rem; outline: none; transition: border-color .2s;
    }
    .field:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 1.3rem; letter-spacing: 2px;
      padding: .85rem 2rem; border-radius: 8px;
      border: none; cursor: pointer; transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 1.25rem; }
    .btn-primary:hover:not(:disabled) { background: #3d6b3a; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); font-size: 1rem;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); font-size: 1rem; }
    .btn-danger:hover { background: var(--red); color: #fff; }

    /* GAME */
    #screen-game { flex-direction: column; height: 100vh; }
    .hud {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: .6rem 1.5rem;
      display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
    }
    .hud-brand { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--accent); }
    .hud-path {
      flex: 1; display: flex; align-items: center; gap: .4rem;
      flex-wrap: wrap; overflow: hidden;
      font-family: 'IBM Plex Mono', monospace; font-size: .75rem;
    }
    .crumb {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: .2rem .5rem; color: var(--muted);
      max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .crumb.start   { border-color: var(--text); color: var(--text); }
    .crumb.end     { border-color: var(--text); color: var(--text); }
    .crumb.current { border-color: #ffffff55; color: var(--text); }
    .sep { color: var(--border); }
    .hud-stats {
      display: flex; align-items: center; gap: 1.2rem;
      font-family: 'IBM Plex Mono', monospace; font-size: .8rem; flex-shrink: 0;
    }
    .stat { display: flex; align-items: center; gap: .4rem; }
    .stat-val { font-size: 1rem; font-weight: 600; color: var(--text); }
    .stat-icon { color: var(--muted); }
    .hud-actions { display: flex; gap: .5rem; flex-shrink: 0; }

    .target-banner {
      background: #161616; border-bottom: 1px solid var(--border);
      padding: .5rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }
    .target-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap;
    }
    .target-title { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--text); }
    .target-hint {
      margin-left: auto; color: var(--muted); font-size: .75rem;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;
    }

    .wiki-area { flex: 1; overflow-y: auto; position: relative; background: #fff; }
    #wiki-content {
      background: #fff; color: #202122;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px; line-height: 1.65;
      max-width: 960px; margin: 0 auto; padding: 1.5rem 2rem 3rem;
    }
    #wiki-content h1 { font-size: 1.95em; border-bottom: 1px solid #a2a9b1; margin-bottom: .5em; padding-bottom: .2em; font-weight: normal; }
    #wiki-content h2 { font-size: 1.4em; border-bottom: 1px solid #a2a9b1; margin: 1.2em 0 .4em; padding-bottom: .2em; font-weight: normal; }
    #wiki-content h3 { font-size: 1.15em; margin: .8em 0 .3em; font-weight: bold; }
    #wiki-content h4 { font-size: 1em; margin: .6em 0 .2em; font-weight: bold; }
    #wiki-content p  { margin-bottom: .8em; }
    #wiki-content a.wiki-link { color: #3366cc; text-decoration: none; cursor: pointer; }
    #wiki-content a.wiki-link:hover { text-decoration: underline; color: #0645ad; }
    #wiki-content a.dead-link { color: #202122; cursor: default; text-decoration: none; }
    #wiki-content ul, #wiki-content ol { margin: .4em 0 .8em 2em; }
    #wiki-content li { margin-bottom: .3em; }
    #wiki-content table { border-collapse: collapse; margin: 1em 0; font-size: .9em; max-width: 100%; }
    #wiki-content table td, #wiki-content table th { border: 1px solid #a2a9b1; padding: .3em .6em; vertical-align: top; }
    #wiki-content table th { background: #eaecf0; }
    #wiki-content .infobox { float: right; clear: right; margin: 0 0 1em 1.5em; border: 1px solid #a2a9b1; background: #f8f9fa; font-size: .875em; max-width: 280px; }
    #wiki-content img { max-width: 100%; height: auto; }
    #wiki-content sup { font-size: .75em; }
    #wiki-content .reference, #wiki-content .reflist, #wiki-content .references { display: none; }
    #wiki-content .navbox, #wiki-content .sistersitebox, #wiki-content .hatnote { display: none; }
    #wiki-content .mw-editsection { display: none; }
    #wiki-content .mw-references-wrap,.magnify,[role="note"],.mw-empty-elt,.printfooter,.catlinks { display: none; }
    #wiki-content .thumb { clear: right; float: right; margin: 0 0 .8em 1.2em; border: 1px solid #c8ccd1; background: #f8f9fa; padding: 4px; font-size: .875em; text-align: center; }
    #wiki-content .thumbcaption { color: #555; font-size: .875em; padding: .3em 0; }

    .loading-overlay {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; z-index: 50; transition: opacity .3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: .8rem; color: var(--muted); letter-spacing: 2px; }

    /* WIN */
    #screen-win { flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    .confetti-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(83,141,78,.15) 0%, transparent 70%); pointer-events: none; }
    .win-title { font-family: 'Bebas Neue', Impact, sans-serif; font-size: clamp(4rem, 15vw, 8rem); letter-spacing: 4px; color: var(--text); text-align: center; animation: pop .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .win-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: .85rem; letter-spacing: 4px; color: var(--muted); text-align: center; margin-top: .5rem; }
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px; margin: 2rem 0; position: relative; z-index: 1; }
    .result-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .result-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
    .result-stat .val { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 2.5rem; color: var(--text); line-height: 1; }
    .result-stat .lbl { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: 2px; color: var(--muted); margin-top: .3rem; text-transform: uppercase; }
    .path-display { font-family: 'IBM Plex Mono', monospace; font-size: .75rem; color: var(--muted); line-height: 2; margin-bottom: 1.5rem; word-break: break-word; }
    .win-actions { display: flex; flex-direction: column; gap: .75rem; }

    .save-status {
      font-family: 'IBM Plex Mono', monospace; font-size: .75rem;
      text-align: center; padding: .5rem; border-radius: 6px; margin-top: .5rem;
    }
    .save-status.saving  { color: var(--muted); }
    .save-status.saved   { color: var(--accent); }
    .save-status.failed  { color: var(--red); }

    /* NOTIF */
    .notif {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: .75rem 1.5rem;
      font-family: 'IBM Plex Mono', monospace; font-size: .8rem; color: var(--text);
      z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap;
    }
    .notif.show    { transform: translateX(-50%) translateY(0); }
    .notif.success { border-color: var(--accent); color: var(--accent); }
    .notif.error   { border-color: var(--red); color: var(--red); }

    @media (max-width: 600px) {
      .hud { padding: .5rem .75rem; gap: .75rem; }
      .crumb { max-width: 75px; }
      .target-hint { display: none; }
      #wiki-content { padding: 1rem; }
      .infobox { float: none; margin: 0 auto 1em; max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="logo">WIKI<span>RACE</span></div>
  <div class="logo-sub">navega hasta el destino</div>
  <div class="home-card">
    <div class="daily-badge">carrera del día</div>
    <div class="no-pair-msg" id="no-pair-msg">
      ⚠ No hay carrera definida para hoy. Añade un par para esta fecha en DAILY_PAIRS.
    </div>
    <div class="route-preview">
      <div class="route-chip loading" id="preview-start">…</div>
      <div class="route-arrow">→</div>
      <div class="route-chip loading" id="preview-end">…</div>
    </div>
    <div class="field-label">Tu nombre</div>
    <input class="field" id="player-name" type="text" placeholder="Escribe tu nombre para jugar" maxlength="24" oninput="checkReady()"/>
    <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>INICIAR CARRERA</button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="hud">
    <div class="hud-brand">WR</div>
    <div class="hud-path" id="hud-path"></div>
    <div class="hud-stats">
      <div class="stat"><span class="stat-icon">⏱</span><span class="stat-val" id="hud-timer">00:00</span></div>
      <div class="stat"><span class="stat-icon">🖱</span><span class="stat-val" id="hud-clicks">0</span></div>
    </div>
    <div class="hud-actions">
      <button class="btn btn-ghost" style="padding:.4rem .8rem;font-size:.8rem" onclick="goBack()">← Atrás</button>
      <button class="btn btn-danger" style="padding:.4rem .8rem;font-size:.8rem" onclick="confirmGiveUp()">Rendirse</button>
    </div>
  </div>
  <div class="target-banner">
    <div class="target-label">Destino</div>
    <div class="target-title" id="target-display">—</div>
    <div class="target-hint" id="target-hint"></div>
  </div>
  <div class="wiki-area">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">CARGANDO WIKIPEDIA…</div>
    </div>
    <div id="wiki-content"></div>
  </div>
</div>

<!-- WIN -->
<div id="screen-win" class="screen">
  <div class="confetti-bg"></div>
  <div class="win-title">¡LLEGASTE!</div>
  <div class="win-subtitle" id="win-player-name"></div>
  <div class="result-card">
    <div class="result-stats">
      <div class="result-stat"><div class="val" id="win-time">—</div><div class="lbl">Tiempo</div></div>
      <div class="result-stat"><div class="val" id="win-articles">—</div><div class="lbl">Artículos</div></div>
    </div>
    <div class="path-display" id="win-path"></div>
    <div class="save-status" id="save-status"></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ╔══════════════════════════════════════════════════════════════════════╗
// ║  CONFIGURACIÓN DE CARRERAS DIARIAS                                   ║
// ║                                                                      ║
// ║  Formato de clave: 'AAAA-MM-DD'                                      ║
// ║  Añade tantas fechas como quieras.                                   ║
// ║                                                                      ║
// ║  Los títulos deben coincidir EXACTAMENTE con el título del           ║
// ║  artículo en Wikipedia en español. Ej: 'Agujero negro', no           ║
// ║  'agujero negro' ni 'Agujero_Negro'.                                 ║
// ╚══════════════════════════════════════════════════════════════════════╝
const DAILY_PAIRS = {
  '2026-04-08': { start: 'Guitarra',       end: 'Océano' },
  '2026-04-09': { start: 'Parque Jurásico (película)',       end: 'Gripe aviaria' },
  '2026-04-10': { start: 'Reloj',       end: 'Cesio' },
  '2026-04-13': { start: 'Reloj',       end: 'Cesio' },  
  '2026-04-14': { start: 'Reloj',       end: 'Cesio' },  
  '2026-04-15': { start: 'Reloj',       end: 'Cesio' },  
  '2026-04-16': { start: 'Reloj',       end: 'Cesio' }, 
  '2026-04-17': { start: 'Reloj',       end: 'Cesio' },  
  '2026-04-20': { start: 'Reloj',       end: 'Cesio' },
  '2026-04-21': { start: 'Isla de la Cartuja',     end: 'Moulin Rouge!' },
  '2026-04-23': { start: 'Harry Potter',    end: 'El origen de las especies' },
  '2026-04-24': { start: 'Bitcoin',       end: 'Paella' },
  '2026-04-25': { start: 'Abies pinsapo',       end: 'Adolf Hitler' },
  '2026-04-26': { start: 'Relatividad general',       end: 'Real Betis Balompié' },
  // ── Añade más pares aquí siguiendo el mismo formato ──────────────────
  // 'AAAA-MM-DD': { start: 'Artículo de inicio', end: 'Artículo destino' },
};

// Artículo de fallback si no hay par definido para hoy
const FALLBACK_PAIR = { start: 'Uno', end: 'Cero' };

// ╔══════════════════════════════════════════════════════════════════════╗
// ║  URL de tu Google Apps Script (para guardar resultados)             ║
// ╚══════════════════════════════════════════════════════════════════════╝
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6Wn4c64vJBg-zpwX3sHnqwVGaHnRMttBHW3-6Zw8vPJYeBFqnIoZAO_Cz71iYJTHPTg/exec';
// ════════════════════════════════════════════════════════════════════════

const BLOCKED = [
  '/wiki/Special:','/wiki/Wikipedia:','/wiki/Archivo:',
  '/wiki/Ayuda:','/wiki/Portal:','/wiki/Categoría:',
  '/wiki/File:','/wiki/Help:','/wiki/Category:',
  '/wiki/Plantilla:','/wiki/Template:','/wiki/Usuario:'
];

const CONFIG = { start: '', end: '' };
const state = {
  playerName: '', currentArticle: '',
  path: [], clicks: 0,
  startTime: null, timerInterval: null, elapsed: 0,
  history: [],
};

// ── Obtener fecha local en formato AAAA-MM-DD ──
function getTodayKey() {
  const now = new Date();
  const y   = now.getFullYear();
  const m   = String(now.getMonth() + 1).padStart(2, '0');
  const d   = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ── INIT ──
let articlesReady = false;

(async function init() {
  const key  = getTodayKey();
  const pair = DAILY_PAIRS[key] || null;

  if (!pair) {
    // No hay par para hoy: mostrar aviso y usar fallback
    document.getElementById('no-pair-msg').style.display = 'block';
    CONFIG.start = FALLBACK_PAIR.start;
    CONFIG.end   = FALLBACK_PAIR.end;
  } else {
    CONFIG.start = pair.start;
    CONFIG.end   = pair.end;
  }

  document.getElementById('preview-start').textContent = CONFIG.start;
  document.getElementById('preview-end').textContent   = CONFIG.end;
  document.getElementById('preview-start').classList.remove('loading');
  document.getElementById('preview-end').classList.remove('loading');

  articlesReady = true;
  checkReady();
})();

function checkReady() {
  const name = document.getElementById('player-name').value.trim();
  document.getElementById('start-btn').disabled = !(articlesReady && name.length > 0);
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  clearInterval(state.timerInterval);
  document.getElementById('wiki-content').innerHTML = '';
  showScreen('screen-home');
}

// ── START ──
async function startGame() {
  state.playerName = document.getElementById('player-name').value.trim() || 'Anónimo';
  state.clicks     = 0;
  state.path       = [CONFIG.start];
  state.history    = [CONFIG.start];
  state.startTime  = Date.now();
  state.elapsed    = 0;
  document.getElementById('hud-clicks').textContent    = '0';
  document.getElementById('target-display').textContent = CONFIG.end;
  showScreen('screen-game');
  startTimer();
  await loadArticle(CONFIG.start);
}

// ── TIMER ──
function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.elapsed = Date.now() - state.startTime;
    document.getElementById('hud-timer').textContent = formatTime(state.elapsed);
  }, 500);
}
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/_/g,' ').trim();
}

// ── LOAD ARTICLE ──
async function loadArticle(title) {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.remove('hidden');
  state.currentArticle = title;
  updateHUDPath();

  if (normalize(title) === normalize(CONFIG.end)) {
    overlay.classList.add('hidden');
    winGame();
    return;
  }

  try {
    const enc  = encodeURIComponent(title.replace(/ /g,'_'));
    const resp = await fetch(`https://es.wikipedia.org/w/api.php?action=parse&page=${enc}&prop=text&formatversion=2&format=json&origin=*`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error.info);
    renderArticle(data.parse.title, data.parse.text);
    overlay.classList.add('hidden');
    fetchTargetHint();
  } catch(err) {
    overlay.classList.add('hidden');
    showNotif('No se encontró: ' + title, 'error');
    console.error(err);
  }
}

function renderArticle(title, rawHtml) {
  const container = document.getElementById('wiki-content');
  const parser    = new DOMParser();
  const doc       = parser.parseFromString(rawHtml, 'text/html');

  ['.mw-editsection','sup.reference','.reflist','.references',
   '.navbox','.navbox-inner','.sistersitebox','.hatnote',
   'script','style','#toc','.toc','.noprint',
   '.mw-references-wrap','.magnify','[role="note"]',
   '.mw-empty-elt','.printfooter','.catlinks'
  ].forEach(sel => doc.querySelectorAll(sel).forEach(el => el.remove()));

  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('/wiki/') && !BLOCKED.some(b => href.startsWith(b))) {
      const t = decodeURIComponent(href.replace('/wiki/','')).replace(/_/g,' ').split('#')[0];
      a.removeAttribute('href');
      a.className = 'wiki-link';
      a.setAttribute('data-title', t);
    } else {
      a.removeAttribute('href');
      a.className = 'dead-link';
    }
  });

  doc.querySelectorAll('img').forEach(img => {
    ['src','data-src'].forEach(attr => {
      const v = img.getAttribute(attr);
      if (!v) return;
      if (v.startsWith('//'))    img.setAttribute(attr, 'https:' + v);
      else if (v.startsWith('/')) img.setAttribute(attr, 'https://es.wikipedia.org' + v);
    });
    img.removeAttribute('srcset');
  });

  container.innerHTML = `<h1>${title}</h1>` + doc.body.innerHTML;
  container.querySelectorAll('.wiki-link[data-title]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const t = a.getAttribute('data-title');
      if (t) navigateTo(t);
    });
  });
  const area = container.closest('.wiki-area');
  if (area) area.scrollTop = 0;
}

async function fetchTargetHint() {
  try {
    const enc = encodeURIComponent(CONFIG.end.replace(/ /g,'_'));
    const r   = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${enc}`);
    if (!r.ok) return;
    const d = await r.json();
    const h = (d.description || '').substring(0, 70);
    document.getElementById('target-hint').textContent = h ? `(${h}...)` : '';
  } catch {}
}

// ── NAVIGATION ──
function navigateTo(title) {
  if (!title) return;
  state.clicks++;
  document.getElementById('hud-clicks').textContent = state.clicks;
  if (state.path[state.path.length-1] !== title) state.path.push(title);
  state.history.push(title);
  loadArticle(title);
}
function goBack() {
  if (state.history.length <= 1) { showNotif('Ya estás en el inicio', 'error'); return; }
  state.history.pop();
  const prev = state.history[state.history.length-1];
  if (state.path[state.path.length-1] === state.currentArticle) state.path.pop();
  loadArticle(prev);
}
function confirmGiveUp() {
  if (confirm('¿Seguro que quieres rendirte?')) { clearInterval(state.timerInterval); goHome(); }
}

function updateHUDPath() {
  const c    = document.getElementById('hud-path');
  let   html = `<span class="crumb start" title="${CONFIG.start}">${CONFIG.start}</span>`;
  const mid  = state.path.slice(1,-1);
  if (mid.length > 2) html += `<span class="sep">…</span>`;
  for (const t of mid.slice(-2)) html += `<span class="sep">›</span><span class="crumb" title="${t}">${t}</span>`;
  if (state.currentArticle !== CONFIG.start)
    html += `<span class="sep">›</span><span class="crumb current" title="${state.currentArticle}">${state.currentArticle}</span>`;
  html += `<span class="sep">›</span><span class="crumb end" title="${CONFIG.end}">${CONFIG.end}</span>`;
  c.innerHTML = html;
}

// ── WIN ──
function winGame() {
  clearInterval(state.timerInterval);
  state.elapsed = Date.now() - state.startTime;

  document.getElementById('win-player-name').textContent = state.playerName;
  document.getElementById('win-time').textContent        = formatTime(state.elapsed);
  document.getElementById('win-articles').textContent    = state.path.length;

  const pathHTML = state.path.map((t,i) =>
    (i > 0 ? `<span style="color:var(--border)"> → </span>` : '') +
    `<span style="color:var(--text)">${t}</span>`
  ).join('');
  document.getElementById('win-path').innerHTML = pathHTML;

  showScreen('screen-win');
  saveResult();
}

// ── GUARDAR EN GOOGLE SHEETS ──
async function saveResult() {
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = '⏳ Guardando resultado…';
  statusEl.className   = 'save-status saving';

  const now  = new Date();
  const date = getTodayKey();

  const payload = {
    fecha:     date,
    hora:      now.toTimeString().slice(0,8),
    jugador:   state.playerName,
    inicio:    CONFIG.start,
    destino:   CONFIG.end,
    tiempo:    formatTime(state.elapsed),
    segundos:  Math.floor(state.elapsed / 1000),
    articulos: state.path.length,
    ruta:      state.path.join(' → '),
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    statusEl.textContent = '✓ Resultado guardado';
    statusEl.className   = 'save-status saved';
  } catch(err) {
    statusEl.textContent = '✗ No se pudo guardar el resultado';
    statusEl.className   = 'save-status failed';
    console.error('saveResult error:', err);
  }
}

// ── NOTIF ──
let notifTimer;
function showNotif(msg, type='') {
  const el = document.getElementById('notif');
  el.textContent = msg; el.className = `notif ${type} show`;
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
